<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MAGI SYSTEM</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
@keyframes borderPulse { 0%,100%{border-color:var(--agent-color)} 50%{border-color:transparent} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0a; color:#ccc; font-family:'Courier New',monospace;
  overflow:hidden; height:100vh; display:flex; flex-direction:column;
}
/* CRT scanline overlay */
body::after {
  content:''; position:fixed; top:0; left:0; width:100%; height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,100,0.03) 2px,rgba(0,255,100,0.03) 4px);
  pointer-events:none; z-index:1000;
}
/* Header */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px; border-bottom:2px solid #333; flex-shrink:0;
}
.header-left { display:flex; align-items:center; gap:16px; }
.system-title {
  font-size:1.1em; font-weight:bold; color:#00ff88;
  letter-spacing:4px; text-transform:uppercase;
}
.system-badge {
  font-size:0.6em; padding:2px 8px; border:1px solid #333;
  color:#666; letter-spacing:2px;
}
.pattern-display {
  font-size:2em; font-weight:bold; letter-spacing:8px;
  color:#888; transition:color 0.5s;
}
.pattern-display.critical { color:#ff0040; animation:blink 1s infinite; }
.pattern-display.severe { color:#ff2200; animation:blink 1s infinite; }
.pattern-display.high { color:#ff8800; }
.pattern-display.elevated { color:#ffaa00; }
.pattern-display.moderate { color:#ffcc00; }
.pattern-display.low { color:#00ff88; }
.pattern-display.clear { color:#888; }
.header-right { display:flex; align-items:center; gap:16px; }
.clock { font-size:0.8em; color:#444; letter-spacing:2px; }
.status-indicator {
  font-size:0.65em; padding:2px 8px; letter-spacing:2px;
  border:1px solid; color:#666; border-color:#333;
}
.status-indicator.active { color:#00ff88; border-color:#00ff88; animation:pulse 2s infinite; }
.status-indicator.processing { color:#ff8800; border-color:#ff8800; animation:pulse 1s infinite; }
/* Main content */
.main { display:flex; flex:1; overflow:hidden; }
/* Sidebar with map */
.sidebar {
  width:280px; padding:0; border-right:1px solid #222;
  overflow-y:auto; flex-shrink:0; display:flex; flex-direction:column;
}
#map {
  width:100%; height:220px; background:#111; flex-shrink:0;
}
/* Dark map tiles */
.leaflet-tile-pane { filter:brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7); }
.leaflet-container { background:#0a0a0a; }
.leaflet-control-attribution { display:none; }
.leaflet-control-zoom a {
  background:#1a1a1a !important; color:#00ff88 !important;
  border-color:#333 !important;
}
.sidebar-metrics {
  padding:10px; flex:1; overflow-y:auto;
}
.sidebar-metrics h3 {
  color:#555; font-size:0.65em; margin-bottom:8px;
  text-transform:uppercase; letter-spacing:2px;
}
.metric {
  display:flex; justify-content:space-between; padding:4px 0;
  border-bottom:1px solid #1a1a1a; font-size:0.7em;
}
.metric-name { color:#555; }
.metric-val { font-weight:bold; }
.data-source {
  font-size:0.6em; color:#333; margin-top:8px; padding:4px;
  border:1px solid #1a1a1a;
}
.data-summary {
  font-size:0.6em; color:#444; margin-top:8px; padding:6px;
  background:#111; border:1px solid #1a1a1a; line-height:1.4;
}
.map-legend {
  padding:6px 10px; font-size:0.6em; color:#555;
  border-bottom:1px solid #1a1a1a; display:flex; gap:12px; flex-wrap:wrap;
}
.legend-item { display:flex; align-items:center; gap:4px; }
.legend-dot {
  width:8px; height:8px; border-radius:50%; display:inline-block;
}
/* Agent panels */
.agents { flex:1; display:flex; gap:1px; background:#1a1a1a; }
.agent-panel {
  --agent-color:#888;
  flex:1; padding:14px; background:#0a0a0a;
  border-top:3px solid var(--agent-color);
  overflow-y:auto; display:flex; flex-direction:column;
  transition:border-color 0.3s;
}
.agent-panel.analyzing { animation:borderPulse 1s infinite; }
.agent-panel.done .agent-content { animation:fadeIn 0.5s ease-out; }
.agent-header {
  font-size:1.1em; font-weight:bold; letter-spacing:3px;
  color:var(--agent-color); margin-bottom:2px;
}
.agent-label {
  font-size:0.6em; letter-spacing:2px; color:var(--agent-color);
  opacity:0.6; margin-bottom:10px;
}
.agent-model {
  font-size:0.55em; color:#333; margin-bottom:8px; letter-spacing:1px;
}
.agent-status {
  font-size:0.7em; color:#444; margin:auto 0; text-align:center;
  letter-spacing:2px;
}
.agent-status.active { color:var(--agent-color); animation:pulse 1s infinite; }
.confidence-bar {
  display:flex; align-items:center; gap:6px; margin-bottom:8px;
}
.confidence-label { font-size:0.65em; color:#555; }
.confidence-track {
  flex:1; height:4px; background:#1a1a1a; position:relative;
}
.confidence-fill {
  height:100%; background:var(--agent-color); transition:width 0.8s ease-out;
  width:0;
}
.confidence-val { font-size:0.7em; color:var(--agent-color); font-weight:bold; min-width:32px; }
.opinion { font-size:0.72em; line-height:1.5; color:#999; margin-bottom:8px; }
.key-points { font-size:0.65em; padding-left:14px; margin-bottom:8px; color:#777; }
.key-points li { margin-bottom:4px; }
.recommendation {
  font-size:0.65em; padding:6px; background:#111;
  border-left:2px solid var(--agent-color); color:#888;
}
.vote {
  font-size:0.85em; font-weight:bold; text-align:center;
  padding:6px; letter-spacing:3px; color:var(--agent-color);
  margin-top:auto;
}
.personal-actions {
  font-size:0.65em; padding:6px; margin-top:6px; margin-bottom:6px;
  background:#0f1a0f; border:1px solid #00ff8833; color:#aaa; line-height:1.5;
}
.personal-actions strong { color:#00ff88; letter-spacing:1px; }
.personal-actions ul { padding-left:14px; margin-top:4px; }
.personal-actions li { margin-bottom:3px; }
/* Streaming text cursor */
.streaming-text {
  font-size:0.72em; line-height:1.5; color:#666; margin-bottom:8px;
  min-height:2em;
}
.streaming-text::after {
  content:'_'; animation:blink 0.8s infinite; color:var(--agent-color);
}
.streaming-text.done::after { content:''; animation:none; }
/* Moderator panel */
.moderator-panel {
  padding:10px 20px; border-top:2px solid #00aaff; background:#0a0e14;
  display:none; flex-shrink:0;
}
.moderator-panel h4 {
  font-size:0.75em; color:#00aaff; letter-spacing:3px;
  margin-bottom:8px; text-transform:uppercase;
}
.moderator-content {
  display:flex; gap:16px; align-items:flex-start;
}
.moderator-text { flex:1; }
.moderator-verdict {
  font-size:0.75em; line-height:1.6; color:#bbb; margin-bottom:8px;
}
.moderator-actions {
  font-size:0.7em;
}
.moderator-actions ol {
  padding-left:18px; color:#999; margin:0;
}
.moderator-actions li { margin-bottom:4px; }
.moderator-actions li strong { color:#00aaff; }
.moderator-video {
  flex-shrink:0; width:280px; display:none;
}
.moderator-video video {
  width:100%; border:1px solid #00aaff44; cursor:pointer;
}
.moderator-video .video-label {
  font-size:0.55em; color:#00aaff88; letter-spacing:2px;
  text-align:center; margin-top:4px; text-transform:uppercase;
}
.moderator-streaming {
  font-size:0.7em; color:#556; min-height:1.5em;
}
.moderator-streaming::after {
  content:'_'; animation:blink 0.8s infinite; color:#00aaff;
}
.moderator-streaming.done::after { content:''; animation:none; }
/* Verdict personal actions panel */
.verdict-actions {
  padding:8px 20px; border-top:1px solid #222; background:#0a0a0a;
  display:none; flex-shrink:0;
}
.verdict-actions h4 {
  font-size:0.7em; color:#00ff88; letter-spacing:2px;
  margin-bottom:6px; text-transform:uppercase;
}
.verdict-actions-grid {
  display:grid; grid-template-columns:repeat(3, 1fr);
  gap:8px; font-size:0.65em;
}
.verdict-actions-col h5 {
  font-size:1em; letter-spacing:1px; margin-bottom:4px;
}
.verdict-actions-col ul { padding-left:14px; color:#999; }
.verdict-actions-col li { margin-bottom:3px; }
.verdict-actions-col.science h5 { color:#00ff88; }
.verdict-actions-col.economics h5 { color:#ff8800; }
.verdict-actions-col.ethics h5 { color:#8800ff; }
/* Control bar */
.controls {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 20px; border-top:2px solid #333; flex-shrink:0;
}
.controls-left { display:flex; gap:8px; }
.btn {
  background:transparent; border:1px solid #444; color:#888;
  padding:6px 16px; font-family:'Courier New',monospace;
  font-size:0.75em; letter-spacing:2px; cursor:pointer;
  text-transform:uppercase; transition:all 0.2s;
}
.btn:hover { border-color:#888; color:#ccc; }
.btn:active { background:#222; }
.btn:disabled { opacity:0.3; cursor:not-allowed; }
.btn.primary { border-color:#00ff88; color:#00ff88; }
.btn.primary:hover { background:#00ff8811; }
.verdict-bar {
  display:flex; align-items:center; gap:12px;
}
.verdict-label { font-size:0.65em; color:#555; letter-spacing:2px; }
.verdict-detail {
  font-size:0.85em; font-weight:bold; letter-spacing:2px;
  transition:color 0.5s;
}
.elapsed { font-size:0.6em; color:#333; }
</style>
</head>
<body>
<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="system-title">MAGI SYSTEM</span>
    <span class="system-badge" id="domainBadge">ECO IMPACT</span>
  </div>
  <div class="pattern-display" id="patternDisplay">---</div>
  <div class="header-right">
    <span class="status-indicator" id="statusIndicator">STANDBY</span>
    <span class="clock" id="clock"></span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar with Map -->
  <div class="sidebar">
    <div id="map"></div>
    <div class="map-legend">
      <div class="legend-item"><span class="legend-dot" style="background:#00ff88"></span> Location</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ff4400"></span> Active Fire</div>
      <div class="legend-item"><span class="legend-dot" style="background:#4488ff"></span> Low FRP</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ff4400"></span> High FRP</div>
    </div>
    <div class="sidebar-metrics">
      <h3>Data Metrics</h3>
      <div id="metricsContainer">
        <div class="agent-status">NO DATA</div>
      </div>
      <div class="data-source" id="dataSource"></div>
      <div class="data-summary" id="dataSummary"></div>
    </div>
  </div>
  <!-- Agent Panels -->
  <div class="agents">
    <div class="agent-panel" id="panel-melchior" style="--agent-color:#00ff88">
      <div class="agent-header">MELCHIOR</div>
      <div class="agent-label">SCIENTIFIC ANALYSIS</div>
      <div class="agent-model" id="model-melchior"></div>
      <div class="agent-status" id="status-melchior">IDLE</div>
      <div class="agent-content" id="content-melchior" style="display:none"></div>
    </div>
    <div class="agent-panel" id="panel-balthasar" style="--agent-color:#ff8800">
      <div class="agent-header">BALTHASAR</div>
      <div class="agent-label">ECONOMIC PRAGMATICS</div>
      <div class="agent-model" id="model-balthasar"></div>
      <div class="agent-status" id="status-balthasar">IDLE</div>
      <div class="agent-content" id="content-balthasar" style="display:none"></div>
    </div>
    <div class="agent-panel" id="panel-casper" style="--agent-color:#8800ff">
      <div class="agent-header">CASPER</div>
      <div class="agent-label">ETHICAL FUTURES</div>
      <div class="agent-model" id="model-casper"></div>
      <div class="agent-status" id="status-casper">IDLE</div>
      <div class="agent-content" id="content-casper" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Moderator Synthesis Panel -->
<div class="moderator-panel" id="moderatorPanel">
  <h4>MAGI UNIFIED ASSESSMENT</h4>
  <div class="moderator-streaming" id="moderatorStreaming"></div>
  <div class="moderator-content">
    <div class="moderator-text">
      <div class="moderator-verdict" id="moderatorVerdict"></div>
      <div class="moderator-actions" id="moderatorActions"></div>
    </div>
    <div class="moderator-video" id="moderatorVideo">
      <video id="cosmosVideo" muted loop playsinline preload="metadata"
             onclick="this.paused ? this.play() : this.pause()">
        <source src="/api/videos/wildfire_la.mp4" type="video/mp4">
      </video>
      <div class="video-label">Wildfire Risk Visualization</div>
    </div>
  </div>
</div>

<!-- Personal Actions Panel (shown after verdict) -->
<div class="verdict-actions" id="verdictActions">
  <h4>WHAT YOU SHOULD DO NOW</h4>
  <div class="verdict-actions-grid" id="verdictActionsGrid"></div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="controls-left">
    <button class="btn" id="btnScan" onclick="doScan()">SCAN</button>
    <button class="btn primary" id="btnDebate" onclick="doDebate()">DEBATE</button>
  </div>
  <div class="verdict-bar">
    <span class="verdict-label">VERDICT</span>
    <span class="verdict-detail" id="verdictDetail">---</span>
    <span class="elapsed" id="elapsedTime"></span>
  </div>
</div>

<script>
const API = '';
const LEVEL_COLORS = {
  critical:'#ff0040', severe:'#ff2200', high:'#ff8800',
  elevated:'#ffaa00', moderate:'#ffcc00', low:'#00ff88', clear:'#888'
};
const SEV_COLORS = {
  critical:'#ff0040', high:'#ff8800', medium:'#ffcc00',
  low:'#00ff88', info:'#888'
};

// --- Leaflet Map ---
const map = L.map('map', {
  center: [34.05, -118.25],
  zoom: 7,
  zoomControl: true,
  attributionControl: false,
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
}).addTo(map);

// Map layers
const mapLayers = {
  center: null,
  incidents: L.layerGroup().addTo(map),
  hotspots: L.layerGroup().addTo(map),
};

function updateMap(data) {
  // Clear existing markers
  mapLayers.incidents.clearLayers();
  mapLayers.hotspots.clearLayers();
  if (mapLayers.center) { map.removeLayer(mapLayers.center); }

  // Center marker
  const center = data.center;
  if (center) {
    mapLayers.center = L.circleMarker([center.lat, center.lon], {
      radius: 8, color: '#00ff88', fillColor: '#00ff88',
      fillOpacity: 0.3, weight: 2,
    }).addTo(map);
    // Add pulsing effect via a larger circle
    L.circle([center.lat, center.lon], {
      radius: 50000, color: '#00ff8844', fillColor: '#00ff8811',
      fillOpacity: 0.1, weight: 1,
    }).addTo(mapLayers.incidents);
    map.setView([center.lat, center.lon], 7);
  }

  // Active fire incidents (CAL FIRE)
  const incidents = data.incidents || [];
  incidents.forEach(inc => {
    if (!inc.latitude || !inc.longitude) return;
    const radius = Math.min(Math.max(Math.sqrt(inc.acres || 1) * 0.5, 4), 20);
    L.circleMarker([inc.latitude, inc.longitude], {
      radius: radius, color: '#ff4400', fillColor: '#ff4400',
      fillOpacity: 0.6, weight: 1,
    }).bindPopup(
      `<b style="color:#ff4400">${inc.name || 'Unknown Fire'}</b><br>` +
      `Acres: ${(inc.acres || 0).toLocaleString()}<br>` +
      `Contained: ${inc.contained || 0}%<br>` +
      `County: ${inc.county || 'N/A'}`
    ).addTo(mapLayers.incidents);
  });

  // Satellite hotspots (NASA FIRMS) — color by FRP
  const hotspots = data.hotspots || [];
  hotspots.forEach(hs => {
    if (!hs.latitude || !hs.longitude) return;
    const frp = hs.frp || 0;
    // FRP-based coloring: low (<5 MW) = blue/industrial, high = orange/red
    let hsColor, hsLabel;
    if (frp >= 10) {
      hsColor = '#ff4400'; hsLabel = 'HIGH FRP — Likely fire';
    } else if (frp >= 5) {
      hsColor = '#ff8800'; hsLabel = 'MODERATE FRP';
    } else {
      hsColor = '#4488ff'; hsLabel = 'LOW FRP — Likely industrial heat';
    }
    const radius = Math.min(Math.max(frp * 0.3, 2), 12);
    L.circleMarker([hs.latitude, hs.longitude], {
      radius: radius, color: hsColor, fillColor: hsColor,
      fillOpacity: 0.6, weight: 0,
    }).bindPopup(
      `<b style="color:${hsColor}">${hsLabel}</b><br>` +
      `FRP: ${frp} MW<br>` +
      `Confidence: ${hs.confidence || 'N/A'}<br>` +
      `Date: ${hs.acq_date || 'N/A'}`
    ).addTo(mapLayers.hotspots);
  });

  // Fit bounds if we have markers
  const allLayers = [...mapLayers.incidents.getLayers(), ...mapLayers.hotspots.getLayers()];
  if (allLayers.length > 2) {
    const group = L.featureGroup(allLayers);
    map.fitBounds(group.getBounds().pad(0.2));
  }
}

// Clock (Pacific Time)
setInterval(() => {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false }) + ' PT';
}, 1000);

function setStatus(text, cls) {
  const el = document.getElementById('statusIndicator');
  el.textContent = text;
  el.className = 'status-indicator' + (cls ? ' ' + cls : '');
}

function setButtons(disabled) {
  document.getElementById('btnScan').disabled = disabled;
  document.getElementById('btnDebate').disabled = disabled;
}

function renderMetrics(data) {
  const container = document.getElementById('metricsContainer');
  const metrics = data.metrics || [];
  if (!metrics.length) {
    container.innerHTML = '<div class="agent-status">NO DATA</div>';
    return;
  }
  container.innerHTML = metrics.slice(0, 8).map(m => {
    const color = SEV_COLORS[m.severity] || '#888';
    return `<div class="metric">
      <span class="metric-name">${m.name}</span>
      <span class="metric-val" style="color:${color}">${m.value} ${m.unit || ''}</span>
    </div>`;
  }).join('');

  document.getElementById('dataSource').textContent =
    `${(data.source || 'unknown').toUpperCase()} | ${(data.timestamp || '').slice(0,19)}`;
  document.getElementById('dataSummary').textContent =
    (data.summary || '').slice(0, 300);
  document.getElementById('domainBadge').textContent =
    (data.domain || 'ECO').toUpperCase() + ' IMPACT';

  // Update map
  updateMap(data);
}

function resetPanels() {
  ['melchior','balthasar','casper'].forEach(id => {
    const panel = document.getElementById('panel-' + id);
    panel.className = 'agent-panel';
    document.getElementById('status-' + id).textContent = 'IDLE';
    document.getElementById('status-' + id).className = 'agent-status';
    document.getElementById('content-' + id).style.display = 'none';
    document.getElementById('content-' + id).innerHTML = '';
    document.getElementById('model-' + id).textContent = '';
  });
  document.getElementById('patternDisplay').textContent = '---';
  document.getElementById('patternDisplay').className = 'pattern-display';
  document.getElementById('verdictDetail').textContent = '---';
  document.getElementById('verdictDetail').style.color = '#888';
  document.getElementById('elapsedTime').textContent = '';
  document.getElementById('verdictActions').style.display = 'none';
  document.getElementById('verdictActionsGrid').innerHTML = '';
  document.getElementById('moderatorPanel').style.display = 'none';
  document.getElementById('moderatorVerdict').innerHTML = '';
  document.getElementById('moderatorActions').innerHTML = '';
  document.getElementById('moderatorStreaming').textContent = '';
  document.getElementById('moderatorStreaming').className = 'moderator-streaming';
  window._agentActions = {};
  window._streamingTexts = {};
}

function renderAgentResult(agentId, result, elapsed) {
  const panel = document.getElementById('panel-' + agentId);
  const statusEl = document.getElementById('status-' + agentId);
  const contentEl = document.getElementById('content-' + agentId);

  panel.classList.remove('analyzing');
  panel.classList.add('done');
  statusEl.style.display = 'none';

  const conf = result.confidence || 0;
  const sev = result.severity != null ? result.severity : conf;
  const kp = (result.key_points || [])
    .map(p => typeof p === 'string' ? p : JSON.stringify(p));
  const actions = (result.personal_actions || [])
    .map(a => typeof a === 'string' ? a : JSON.stringify(a));

  const voteLabel = sev >= 0.9 ? 'CRITICAL' : sev >= 0.75 ? 'HIGH' : sev >= 0.6 ? 'MODERATE' : 'LOW';

  contentEl.innerHTML = `
    <div class="confidence-bar">
      <span class="confidence-label">SEV</span>
      <div class="confidence-track">
        <div class="confidence-fill" style="width:${sev * 100}%"></div>
      </div>
      <span class="confidence-val">${(sev * 100).toFixed(0)}%</span>
    </div>
    <div class="opinion">${(result.opinion || 'No response').slice(0, 400)}</div>
    ${kp.length ? '<ul class="key-points">' + kp.map(p => '<li>' + p + '</li>').join('') + '</ul>' : ''}
    ${actions.length ? '<div class="personal-actions"><strong>YOUR ACTIONS:</strong><ul>' + actions.map(a => '<li>' + a + '</li>').join('') + '</ul></div>' : ''}
    <div class="recommendation"><strong>REC:</strong> ${(result.recommendation || 'N/A').slice(0, 250)}</div>
    <div class="vote">VOTE: ${voteLabel}</div>
  `;
  contentEl.style.display = 'block';

  // Store actions for verdict panel
  if (!window._agentActions) window._agentActions = {};
  window._agentActions[agentId] = { perspective: result.perspective, actions };
}

async function doScan() {
  setButtons(true);
  setStatus('SCANNING', 'processing');
  try {
    const res = await fetch(API + '/api/scan');
    const data = await res.json();
    renderMetrics(data);
    setStatus('DATA READY', 'active');
  } catch (e) {
    setStatus('SCAN FAILED', '');
    console.error(e);
  }
  setButtons(false);
}

function doDebate() {
  setButtons(true);
  resetPanels();
  setStatus('DEBATING', 'processing');
  const t0 = performance.now();

  fetch(API + '/api/debate', { method: 'POST' }).then(response => {
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let currentEvent = '';
    let currentData = '';

    function processChunk() {
      reader.read().then(({ done, value }) => {
        if (done) {
          // Process any remaining buffered event
          if (currentEvent && currentData) {
            handleSSEEvent(currentEvent, currentData, t0);
          }
          setButtons(false);
          return;
        }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('event:')) {
            // If we have a pending event, dispatch it before starting a new one
            if (currentEvent && currentData) {
              handleSSEEvent(currentEvent, currentData, t0);
            }
            currentEvent = line.slice(6).trim();
            currentData = '';
          } else if (line.startsWith('data:')) {
            currentData += (currentData ? '\n' : '') + line.slice(5).trim();
          } else if (line.trim() === '') {
            // Empty line = end of SSE message
            if (currentEvent && currentData) {
              handleSSEEvent(currentEvent, currentData, t0);
              currentEvent = '';
              currentData = '';
            }
          }
          // Ignore ping lines (": ping - ...")
        }
        processChunk();
      });
    }
    processChunk();
  }).catch(e => {
    console.error('Debate failed:', e);
    setStatus('DEBATE FAILED', '');
    setButtons(false);
  });
}

function handleSSEEvent(event, dataStr, t0) {
  let data;
  try { data = JSON.parse(dataStr); } catch { return; }

  switch (event) {
    case 'scan_result':
      renderMetrics(data);
      break;

    case 'agent_start': {
      const panel = document.getElementById('panel-' + data.agent);
      const statusEl = document.getElementById('status-' + data.agent);
      const modelEl = document.getElementById('model-' + data.agent);
      const contentEl = document.getElementById('content-' + data.agent);
      panel.classList.add('analyzing');
      statusEl.style.display = 'none';
      modelEl.textContent = 'MODEL: ' + (data.model || '').toUpperCase();
      // Show streaming text area
      contentEl.innerHTML = '<div class="streaming-text" id="stream-' + data.agent + '"></div>';
      contentEl.style.display = 'block';
      if (!window._streamingTexts) window._streamingTexts = {};
      window._streamingTexts[data.agent] = '';
      break;
    }

    case 'agent_chunk': {
      if (!window._streamingTexts) window._streamingTexts = {};
      window._streamingTexts[data.agent] = (window._streamingTexts[data.agent] || '') + data.token;
      const streamEl = document.getElementById('stream-' + data.agent);
      if (streamEl) {
        // Show readable preview (strip JSON syntax for readability)
        const preview = window._streamingTexts[data.agent]
          .replace(/[{}"]/g, '').replace(/,\s*/g, ' | ').slice(-300);
        streamEl.textContent = preview;
        streamEl.scrollTop = streamEl.scrollHeight;
      }
      break;
    }

    case 'agent_result':
      renderAgentResult(data.agent, data.result, data.elapsed);
      break;

    case 'moderator_start': {
      const modPanel = document.getElementById('moderatorPanel');
      modPanel.style.display = 'block';
      document.getElementById('moderatorStreaming').textContent = '';
      document.getElementById('moderatorStreaming').className = 'moderator-streaming';
      window._moderatorText = '';
      break;
    }

    case 'moderator_chunk': {
      window._moderatorText = (window._moderatorText || '') + data.token;
      const modStream = document.getElementById('moderatorStreaming');
      const preview = window._moderatorText
        .replace(/[{}"]/g, '').replace(/,\s*/g, ' | ').slice(-400);
      modStream.textContent = preview;
      break;
    }

    case 'moderator_result': {
      document.getElementById('moderatorStreaming').className = 'moderator-streaming done';
      document.getElementById('moderatorStreaming').style.display = 'none';
      const verdict = data.unified_verdict || data.opinion || 'Assessment complete.';
      document.getElementById('moderatorVerdict').textContent = verdict;
      const actions = data.priority_actions || [];
      if (actions.length) {
        document.getElementById('moderatorActions').innerHTML =
          '<ol>' + actions.map((a, i) =>
            '<li><strong>#' + (i+1) + '</strong> ' + (typeof a === 'string' ? a : JSON.stringify(a)) + '</li>'
          ).join('') + '</ol>';
      }
      // Show Cosmos video if available
      fetch(API + '/api/videos').then(r => r.json()).then(v => {
        if (v.videos && v.videos.length > 0) {
          const videoEl = document.getElementById('moderatorVideo');
          const cosmosEl = document.getElementById('cosmosVideo');
          cosmosEl.querySelector('source').src = API + '/api/videos/' + v.videos[0];
          cosmosEl.load();
          cosmosEl.play();
          videoEl.style.display = 'block';
        }
      }).catch(() => {});

      // Replace "WHAT YOU SHOULD DO NOW" with moderator's unified actions
      const verdictActionsPanel = document.getElementById('verdictActions');
      if (actions.length) {
        const grid = document.getElementById('verdictActionsGrid');
        grid.innerHTML = '<div style="grid-column:1/-1"><ol style="padding-left:18px;color:#ccc;font-size:1.1em;line-height:1.8">' +
          actions.map((a, i) => {
            const icons = ['\u26a0\ufe0f', '\ud83d\udee1\ufe0f', '\ud83e\udd1d'];
            return '<li style="margin-bottom:6px"><strong style="color:#00aaff">' +
              (typeof a === 'string' ? a : JSON.stringify(a)) + '</strong></li>';
          }).join('') + '</ol></div>';
        verdictActionsPanel.querySelector('h4').textContent = 'WHAT YOU SHOULD DO NOW — UNIFIED PRIORITIES';
        verdictActionsPanel.style.display = 'block';
      }
      break;
    }

    case 'verdict': {
      const level = data.level || 'clear';
      const pattern = data.pattern || '---';
      const riskScore = data.risk_score != null ? data.risk_score : '---';
      const color = LEVEL_COLORS[level] || '#888';

      const patternEl = document.getElementById('patternDisplay');
      patternEl.textContent = riskScore + '/100';
      patternEl.className = 'pattern-display ' + level;

      const verdictEl = document.getElementById('verdictDetail');
      verdictEl.textContent = 'RISK ' + riskScore + '/100 \u2014 ' + level.toUpperCase();
      verdictEl.style.color = color;

      // Show personal actions panel
      const actionsPanel = document.getElementById('verdictActions');
      const actionsGrid = document.getElementById('verdictActionsGrid');
      const agentActions = window._agentActions || {};
      const perspectiveMap = {
        melchior: { label: 'SCIENCE', cls: 'science' },
        balthasar: { label: 'ECONOMICS', cls: 'economics' },
        casper: { label: 'ETHICS', cls: 'ethics' },
      };
      let hasActions = false;
      let gridHtml = '';
      for (const aid of ['melchior', 'balthasar', 'casper']) {
        const info = perspectiveMap[aid];
        const aa = (agentActions[aid] || {}).actions || [];
        if (aa.length) hasActions = true;
        gridHtml += `<div class="verdict-actions-col ${info.cls}">
          <h5>${info.label}</h5>
          ${aa.length ? '<ul>' + aa.map(a => '<li>' + a + '</li>').join('') + '</ul>' : '<div style="color:#444">\u2014</div>'}
        </div>`;
      }
      actionsGrid.innerHTML = gridHtml;
      actionsPanel.style.display = hasActions ? 'block' : 'none';
      break;
    }

    case 'debate_end': {
      const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
      document.getElementById('elapsedTime').textContent = elapsed + 's';
      setStatus('COMPLETE', 'active');
      setButtons(false);
      break;
    }
  }
}
</script>
