services:
  magi-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./memory:/app/memory
      - ./config.json:/app/config.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MAGI_CONFIG=/app/config.json
    working_dir: /app/scripts
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  magi:
    build: .
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw-workspace:/app/openclaw-workspace
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./memory:/app/memory
      - ./config.json:/app/config.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    restart: unless-stopped
