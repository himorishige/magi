services:
  magi:
    build: .
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw-workspace:/app/openclaw-workspace
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./memory:/app/memory
      - ./config.json:/app/config.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    restart: unless-stopped
